<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZAYA-TEC</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #050a05;
      --green:  #39ff6a;
      --muted:  #2e5c3a;
      --dim:    #1a3320;
      --text:   #8ecf99;
      --mono:   'Share Tech Mono', monospace;
      --vt:     'VT323', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 99;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.93; }
      10%  { opacity: 0.99; }
      50%  { opacity: 0.98; }
      100% { opacity: 0.97; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes scan {
      from { top: -40%; }
      to   { top: 110%; }
    }

    .screen {
      animation: flicker 7s infinite;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    .scanline {
      position: fixed;
      left: 0; right: 0;
      height: 40px;
      background: linear-gradient(transparent, rgba(57,255,106,0.03), transparent);
      pointer-events: none;
      z-index: 98;
      animation: scan 6s linear infinite;
    }

    .label {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .big {
      font-family: var(--vt);
      font-size: clamp(5rem, 18vw, 14rem);
      line-height: 0.9;
      color: var(--green);
      text-shadow:
        0 0 20px rgba(57,255,106,0.4),
        0 0 60px rgba(57,255,106,0.15);
      letter-spacing: 0.06em;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--muted), transparent);
      margin: 0 auto 2rem;
    }

    .message {
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.1em;
      line-height: 2;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 2.5rem;
    }
    .sub a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed var(--muted);
      transition: color 0.2s, border-color 0.2s;
    }
    .sub a:hover {
      color: var(--green);
      border-color: var(--green);
    }

    .cursor-line {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }
    .blink { animation: blink 1.1s step-end infinite; }

    .corners {
      position: fixed;
      inset: 1.5rem;
      pointer-events: none;
      z-index: 2;
    }
    .corners::before,
    .corners::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--muted);
      border-style: solid;
    }
    .corners::before {
      top: 0; left: 0;
      border-width: 1px 0 0 1px;
    }
    .corners::after {
      bottom: 0; right: 0;
      border-width: 0 1px 1px 0;
    }

    .corners2::before,
    .corners2::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--muted);
      border-style: solid;
    }
    .corners2::before {
      top: 0; right: 0;
      border-width: 1px 1px 0 0;
    }
    .corners2::after {
      bottom: 0; left: 0;
      border-width: 0 0 1px 1px;
    }
    .corners2 {
      position: fixed;
      inset: 1.5rem;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

<div class="scanline"></div>
<div class="corners"></div>
<div class="corners2"></div>

<div class="screen">
  <div class="label">// ZAYA-TEC - PAGE STATUS</div>

  <div class="big">JIŽ<br>BRZY</div>

  <div class="divider"></div>

  <p class="message">Na těchto stránkách se aktuálně pracuje<br>a již brzy se můžete dočkat jejich zprovoznění.</p>
  <p class="sub">Provozuje <a href="https://artic.leosight.cz/zayatec.ic" target="_top">ZAYA-TEC</a></p>

  <div class="cursor-line">[ STANDBY ] <span class="blink">_</span></div>
</div>

</body>
</html>
