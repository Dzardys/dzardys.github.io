<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse.</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --blue: #2563eb;
      --muted: #444;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.6;
    }

    main {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      user-select: none;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 15vw, 11rem);
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
    }

    .logo-dot-wrap {
      position: relative;
      display: inline-block;
      margin-left: 0.04em;
      margin-bottom: 0.04em;
      align-self: flex-end;
    }

    .logo-dot {
      display: block;
      width: clamp(0.6rem, 1.7vw, 1.3rem);
      height: clamp(0.6rem, 1.7vw, 1.3rem);
      background: var(--blue);
      border-radius: 50%;
      position: relative;
      z-index: 2;
      margin-bottom: clamp(0.55rem, 1.5vw, 1.1rem);
    }

    .logo-dot::before,
    .logo-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse-ring 2s ease-out infinite;
    }
    .logo-dot::after {
      animation-delay: 0.9s;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    .contact-block {
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.7s 1.2s forwards;
    }

    .contact-block p.label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    .contact-block a {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      position: relative;
    }

    .contact-block a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 1px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    .contact-block a:hover::after { transform: scaleX(1); }
    .contact-block a:hover { color: #fff; }

    .contact-block .name {
      margin-top: 0.7rem;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tagline {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: rise 0.7s 0.1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <main>
    <p class="tagline">Social Media</p>
    <div class="logo-wrap">
      <span class="logo-text">Pulse</span>
      <span class="logo-dot-wrap">
        <span class="logo-dot"></span>
      </span>
    </div>
    <div class="contact-block">
      <p class="label">Kontakt</p>
      <a href="https://artic.leosight.cz/post.ic">adrian@voss.ic</a>
      <p class="name">Adrian Voss</p>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const orbs = Array.from({length: 5}, () => ({
      x: Math.random() * 1,
      y: Math.random() * 1,
      r: 180 + Math.random() * 220,
      sp: 0.0002 + Math.random() * 0.0003,
      offset: Math.random() * Math.PI * 2,
      alpha: 0.04 + Math.random() * 0.05,
    }));

    let t = 0;
    function loop() {
      ctx.clearRect(0, 0, W, H);
      t += 0.008;

      orbs.forEach(o => {
        const cx = W * (0.3 + 0.4 * Math.sin(t * o.sp * 300 + o.offset));
        const cy = H * (0.3 + 0.4 * Math.cos(t * o.sp * 300 + o.offset * 1.3));
        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, o.r);
        grd.addColorStop(0,   `rgba(37,99,235,${o.alpha})`);
        grd.addColorStop(1,   'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(cx, cy, o.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = 'rgba(255,255,255,0.012)';
      for (let y = 0; y < H; y += 4) {
        ctx.fillRect(0, y, W, 1);
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
