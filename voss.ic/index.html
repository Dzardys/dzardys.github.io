<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voss Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #00e5ff;
      --accent2: #7b2fff;
      --text: #f0f0f0;
      --muted: #555566;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      opacity: 0.5;
    }

    main {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    .tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.6rem;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.8s 0.2s forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(24px);
      animation: rise 0.9s 0.45s forwards;
    }

    h1 span {
      display: block;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .contact-block {
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.8s 1.1s forwards;
    }

    .contact-block p {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .contact-block a {
      font-size: 1.05rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--muted);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    .contact-block a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .name {
      margin-top: 0.9rem;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(0,229,255,0.08);
      pointer-events: none;
      z-index: 2;
      animation: spin linear infinite;
    }
    .ring-1 { width: 500px; height: 500px; top: 50%; left: 50%; margin: -250px; animation-duration: 28s; }
    .ring-2 { width: 780px; height: 780px; top: 50%; left: 50%; margin: -390px; border-color: rgba(123,47,255,0.06); animation-duration: 44s; animation-direction: reverse; }
    .ring-3 { width: 1100px; height: 1100px; top: 50%; left: 50%; margin: -550px; animation-duration: 60s; }

    .ring::before {
      content: '';
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      top: -2.5px; left: 50%;
      margin-left: -2.5px;
      box-shadow: 0 0 10px 3px var(--accent);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <main>
    <p class="tag">Social Media</p>
    <h1>Voss<span>Digital</span></h1>
    <div class="contact-block">
      <p>Kontakt</p>
      <a href="https://artic.leosight.cz/post.ic">adrian@voss.ic</a>
      <p class="name">Adrian Voss</p>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + 0.3;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.25;
        this.alpha = Math.random() * 0.4 + 0.05;
        this.hue = Math.random() < 0.5 ? 186 : 270; // cyan or purple
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    let mx = W / 2, my = H / 2;
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function loop() {
      ctx.clearRect(0, 0, W, H);

      const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.4);
      grd.addColorStop(0,   'rgba(0,229,255,0.04)');
      grd.addColorStop(0.5, 'rgba(123,47,255,0.03)');
      grd.addColorStop(1,   'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 90) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0,229,255,${0.07 * (1 - dist/90)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
